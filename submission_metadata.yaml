ai_tools_used:
  - "OpenAI Codex"

ai_usage_summary: |
  OpenAI Codex was used for architecture research, implementation, debugging,
  testing, and documentation. Candidate ranking runs locally without hosted
  LLM or API calls.

methodology_summary: |
  CPU-only deterministic hybrid candidate ranker. It extracts career,
  profile, weighted-skill, and compressed evidence views; combines TF-IDF,
  BGE sentence embeddings with a compact FAISS index, exact rule/title recall,
  semantic narrative-rarity features that recover plain-language experts,
  structured product/retrieval/production/evaluation features, behavioral
  availability, and consistency/honeypot penalties; and applies an XGBoost
  pseudo-relevance reranker with a transparent formula fallback. Final
  reasoning is generated only from stored candidate facts and evidence.

declarations:
  read_submission_spec: true
  code_is_original_work: true
  no_collusion: true
  honeypot_check_done: true
  reproduction_tested: true
